name: deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'packages/contracts/**'
      - '.env.prod'
      - 'pnpm-lock.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/miniTicket

            GIT_SSH_COMMAND="ssh -F /dev/null -p 443 -o HostName=ssh.github.com" git pull origin main

            pnpm install --frozen-lockfile

            pnpm --filter api prisma:generate
            NODE_ENV=production pnpm --filter api prisma:migrate deploy

            pnpm --filter api build

            pm2 restart miniticket-api || pm2 start apps/api/ecosystem.config.js --env production
            pm2 save
