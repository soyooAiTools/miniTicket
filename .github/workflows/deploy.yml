name: deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'packages/contracts/**'
      - '.env.prod'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: echo "deploy"
